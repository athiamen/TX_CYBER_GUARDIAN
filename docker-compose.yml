services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyber-guardian-app
    hostname: cyber-guardian-app
    environment:
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_API_URL: ${BACKEND_URL:-http://host.docker.internal:4000/api}
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    stdin_open: true
    tty: true