services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    environment:
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_API_URL: http://host.docker.internal:4000/api
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true